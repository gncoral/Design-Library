name: Update Design Library

on:
  schedule:
    - cron: '0 2 * * *'  # 每天早上10点(北京时间)更新
  workflow_dispatch:      # 也可以手动触发

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Keep data fresh
        run: echo "Auto-update placeholder - connect scraper here"
      - name: Commit if changed
        run: |
          git config user.name "Design Library Bot"
          git config user.email "bot@design-library"
          git add -A
          git diff --staged --quiet || git commit -m "chore: daily update $(date +%Y-%m-%d)"
          git push
